<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender | Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7fb; color: #0f172a; }
        .result-card { max-width: 700px; margin: 70px auto; padding: 40px; border-radius: 16px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .navbar-brand, .nav-link { color: white !important; }
        .navbar { background: linear-gradient(135deg, #0f172a, #2563eb); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Smart Lender</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/predict">Predict</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="result-card text-center">
        <h2 class="fw-bold mb-3">Prediction Result</h2>
        <div class="display-6 fw-bold {% if result == 'Loan Approved' %}text-success{% else %}text-danger{% endif %}">{{ result }}</div>
        <p class="mt-3 text-muted">The trained machine learning model has produced this decision based on the applicant information.</p>
        <a class="btn btn-primary mt-3" href="/predict">Try Another Applicant</a>
    </div>
</div>
</body>
</html>
