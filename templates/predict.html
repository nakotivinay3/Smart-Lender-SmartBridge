<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender | Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f4f7fb; color: #0f172a; }
        .form-card { max-width: 900px; margin: 40px auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .navbar-brand, .nav-link { color: white !important; }
        .navbar { background: linear-gradient(135deg, #0f172a, #2563eb); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Smart Lender</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/predict">Predict</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="form-card p-4 p-md-5">
        <h2 class="fw-bold mb-3">Loan Eligibility Form</h2>
        <p class="text-muted">Enter the applicant details to receive an instant prediction.</p>
        <form method="post" action="/predict">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="Gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Married</label>
                    <select class="form-select" name="Married">
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dependents</label>
                    <select class="form-select" name="Dependents">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3+">3+</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Education</label>
                    <select class="form-select" name="Education">
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Self Employed</label>
                    <select class="form-select" name="Self_Employed">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Property Area</label>
                    <select class="form-select" name="Property_Area">
                        <option value="Urban">Urban</option>
                        <option value="Semiurban">Semiurban</option>
                        <option value="Rural">Rural</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Applicant Income</label>
                    <input type="number" class="form-control" name="ApplicantIncome" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Coapplicant Income</label>
                    <input type="number" class="form-control" name="CoapplicantIncome" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Loan Amount</label>
                    <input type="number" class="form-control" name="LoanAmount" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Loan Amount Term</label>
                    <input type="number" class="form-control" name="Loan_Amount_Term" value="360" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Credit History</label>
                    <select class="form-select" name="Credit_History">
                        <option value="1">1</option>
                        <option value="0">0</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg mt-4">Predict Eligibility</button>
        </form>
    </div>
</div>
</body>
</html>
